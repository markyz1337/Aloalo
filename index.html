        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);

#custom-prompt {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    z-index: 9999; 
    background: rgba(10, 10, 12, 0.95);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    
    /* Simplificăm centrarea orizontală */
    overflow-y: auto; /* Permite scroll dacă ecranul e foarte mic */
}

.modal-content {
    background: #1a1a1c;
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 30px;
    width: 280px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);

    /* --- AJUSTARE POZIȚIE --- */

}



.pin-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--locked);
    font-weight: 800;
    margin-bottom: 5px;
    display: block;
}




.text-locked {
    filter: blur(6px);
    user-select: none;         /* Previne selectarea textului */
    pointer-events: none;      /* Previne click/dreapta pe el */
    -webkit-user-select: none; /* Safari */
}


.hope-title { 
    font-family: 'Dancing Script', cursive;
    font-size: 3.9rem; /* Ajustat pentru a se potrivi în layout */
    margin: 0; 
    background: linear-gradient(45deg, #c9184a, #ff4d6d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.1);
    animation: floatTitle 3s ease-in-out infinite;
    display: inline-block;
}

@keyframes floatTitle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
}





.search-container {

    gap: 12px;
    border-radius: 50px !important;
    min-height: unset !important;
}

/* Ne asigurăm că input-ul nu are margini care să îl împingă */
#search-input {
    margin: 0 !important;
    padding: 0 !important;
    line-height: normal !important;
}




/* MODIFICĂ ACEST BLOC ÎN CSS */
#radio-popup {

/* În secțiunea <style> */

        /* GRID & CARDS */
        .app-container { width: 100%; max-width: 900px; margin-top: 10px; }

        .glass-card {

            flex-direction: column;
            justify-content: space-between;

        .btn-glass:hover:not(:disabled) { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-glass:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ISTORIC */

            background: rgba(255,255,255,0.02);

            cursor: pointer;

/* Containerul butonului - acum vizibil când e oprit */
#play-indicator {
    width: 46px; /* Mărit cu 25% (de la 45px) */
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 1;
}

/* Starea OPRIT: Efect de sticlă mată discretă */
.radio-off {
    background: rgba(255, 255, 255, 0.08) !important;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

/* Starea PORNIT: Culoarea de accent și pregătirea stratului de sub */
.radio-on {
    background: var(--accent) !important;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Stratul de "respirație" care apare doar când e ON */
.radio-on::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--accent);
    border-radius: 50%;
    z-index: -1;
    animation: breathing-layer 4s ease-in-out infinite;
}

/* Animația de respirație: doar fundalul se mișcă */
@keyframes breathing-layer {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 15px 2px rgba(255, 77, 109, 0.4);
        opacity: 0.8;
    }
    50% {
        transform: scale(1.15); /* Doar halo-ul se extinde */
        box-shadow: 0 0 25px 8px rgba(255, 77, 109, 0.5);
        opacity: 0.6;
    }
}

/* Fixăm iconițele să nu se mărească */
#play-indicator svg {
    position: relative;
    z-index: 3;
    width: 25px; /* Mărit cu 25% */
    height: 25px;
}







#radio-popup:active #play-indicator {
    transform: scale(0.9);
}

/* Stiluri Timeline */
.streak-timeline-side {
    width: 45px;

.timeline-v-track {

#timeline-fill-v {

.steps-v-wrapper {

let lastScrollPos = 0;

function preventScroll(e) {
    // Salvăm poziția actuală de scroll înainte ca browserul să o schimbe
    lastScrollPos = window.scrollY || document.documentElement.scrollTop;
    
    // Folosim un timeout scurt pentru a anula scroll-ul automat al browserului
    setTimeout(() => {
        window.scrollTo(0, lastScrollPos);
    }, 10);
}



function openStreakModal(isDailyUpdate = false, rewardType = "daily") {
    const modal = document.getElementById('streak-modal');
    if (modal) {
        let currentStreak = 0;
        
        if (!USE_API) {
            currentStreak = MOCK_DATA.streak;
        } else {
            const streakElem = document.getElementById('streak-val');
            currentStreak = parseInt(streakElem.innerText) || 0;
        }
        
        updateStreakVisuals(currentStreak);
        
        const subtitle = modal.querySelector('.streak-header-mini p');
        
        if (isDailyUpdate) {
            if (rewardType === "bonus") {
                // Mesaj special pentru pragurile 7, 30, 90, etc.
                const bonusValue = STREAK_BONUSES.find(b => b.days === currentStreak)?.reward || 0;
                subtitle.innerHTML = `🌟 PRAG ATINS! <span style="color: #ff4d6d;">+${bonusValue + 1} Credite</span> (Daily + Bonus)`;
            } else {
                // Mesaj standard
                subtitle.innerHTML = 'Bună dimineața! <span style="color: #00d4ff;">+1 Credit Zilnic</span>';
            }
            subtitle.style.fontWeight = "800";
        } else {
            subtitle.innerText = 'Streak Activ';
            subtitle.style.fontWeight = "normal";
        }
        
        modal.style.display = 'flex';
    }
}




function updateStreakVisuals(currentStreak) {
    document.getElementById('streak-title-display').innerText = `${currentStreak} Days`;

    const milestones = [7, 30, 90, 180, 365];
    let totalPercent = 0;
    let nextGoal = 365;
    let foundNext = false;

    // Calculăm procentul barei raportat la segmente (0-100%)
    if (currentStreak <= 7) {
        totalPercent = 0;
    } else if (currentStreak <= 30) {
        totalPercent = ((currentStreak - 7) / (30 - 7)) * 25;
    } else if (currentStreak <= 90) {
        totalPercent = 25 + ((currentStreak - 30) / (90 - 30)) * 25;
    } else if (currentStreak <= 180) {
        totalPercent = 50 + ((currentStreak - 90) / (180 - 90)) * 25;
    } else if (currentStreak <= 365) {
        totalPercent = 75 + ((currentStreak - 180) / (365 - 180)) * 25;
    } else {
        totalPercent = 100;
    }

    // LIMITARE STRICTĂ: Bara nu poate trece de 100% (centrul ultimei buline)
    totalPercent = Math.min(Math.max(totalPercent, 0), 100);

    // Aplicăm animația
    setTimeout(() => {
        const fill = document.getElementById('timeline-fill-v');
        if (fill) fill.style.height = totalPercent + "%";
    }, 200);

    // Activăm vizual bulinele atinse
    milestones.forEach(m => {
        const dot = document.getElementById(`step-${m}`);
        if (dot) {
            if (currentStreak >= m) {
                dot.classList.add('reached');
            } else {
                dot.classList.remove('reached');
                if (!foundNext) { 
                    nextGoal = m; 
                    foundNext = true; 
                }
            }
        }
    });

    const hint = document.getElementById('next-goal-hint');
    
    // Configurare mesaje pentru pragurile viitoare (Text curățat și iconițe)
    const futureRewards = {
        7:   "La pragul de <b>7 zile</b> primești un bonus de <b>+3 Credite</b>.",
        30:  "La <b>30 de zile</b> deblocăm un Super Bonus de <b>+10 Credite</b>.",
        90:  "La <b>90 de zile</b> primești un cadou special de <b>+15 Credite</b>.",
        180: "La <b>180 de zile</b> primești un Grant Regal de <b>+25 Credite</b>.",
        365: "La <b>un an complet</b> primești potul cel mare de <b>+50 Credite</b>."
    };

    if (currentStreak >= 365) {
        hint.innerHTML = `
            <div style="text-align: center; padding: 10px;">
                <span style="color: #ff4d6d; font-weight: 800; font-size: 0.9rem;">🏆 NIVEL MAXIM ATINS</span>
                <p style="margin: 5px 0 0; font-size: 0.75rem; opacity: 0.7;">Ai demonstrat o iubire infinită. ✨</p>
            </div>`;
    } else {
        // Luăm mesajul corespunzător următorului prag găsit (nextGoal)
        const nextMessage = futureRewards[nextGoal] || "Fiecare zi cu tine e un câștig! ✨";
        const zileRamase = nextGoal - currentStreak;
        
        hint.innerHTML = `
            <div style="display: flex; flex-direction: column; gap: 12px; text-align: left;">
                <!-- Mesaj Recompensă -->
                <div style="font-size: 0.8rem; color: rgba(255,255,255,0.9); line-height: 1.4; padding-left: 10px; border-left: 2px solid #00d4ff;">
                    ${nextMessage}
                </div>
                
                <!-- Badge Progres -->
                <div style="background: rgba(0, 212, 255, 0.08); 
                            padding: 10px 12px; 
                            border-radius: 14px; 
                            border: 1px solid rgba(0, 212, 255, 0.2);
                            display: flex;
                            align-items: center;
                            justify-content: center;
                            gap: 8px;
                            margin-top: 5px;">
                    <span style="font-size: 1rem;">⏳</span>
                    <span style="font-size: 0.7rem; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase; color: #00d4ff;">
                        Mai ai <span style="font-size: 0.7rem; color: #fff;">${zileRamase} ${zileRamase === 1 ? 'zi' : 'zile'}</span> până la premiu
                    </span>
                </div>
            </div>
        `;
    }



}

function toggleRadio() {
    const audio = document.getElementById('audio');
    const indicator = document.getElementById('play-indicator');
    const playIcon = document.getElementById('p-play');
    const pauseIcon = document.getElementById('p-pause');

    if (audio.paused) {
        audio.play();
        indicator.classList.remove('radio-off');
        indicator.classList.add('radio-on');
        playIcon.style.display = 'none';
        pauseIcon.style.display = 'block';
    } else {
        audio.pause();
        indicator.classList.remove('radio-on');
        indicator.classList.add('radio-off');
        playIcon.style.display = 'block';
        pauseIcon.style.display = 'none';
    }
}

function getSortedItems(items, currentPoints) {
    return [...items].sort((a, b) => {
        // 1. Prioritate după disponibilitate (Permise vs Nepermise)
        const canAffordA = currentPoints >= a.pret ? 1 : 0;
        const canAffordB = currentPoints >= b.pret ? 1 : 0;

        if (canAffordA !== canAffordB) {
            return canAffordB - canAffordA; // Cele pe care și le permite stau sus
        }

        // 2. Dacă ambele sunt în aceeași stare, aplicăm logica de căutare (dacă există)
        if (searchTerm) {
            const scoreA = calculateScore(a, searchTerm);
            const scoreB = calculateScore(b, searchTerm);
            if (scoreA !== scoreB) return scoreB - scoreA;
        }

        // 3. Sortare secundară implicită (opțional: după preț crescător)
        return a.pret - b.pret;
    });
}


function calculateScore(item, term) {
    let score = 0;
    const title = item.titlu.toLowerCase();
    const desc = item.desc.toLowerCase();

    // Potrivire exactă în titlu (Prioritate maximă)
    if (title.includes(term)) score += 100;
    // Potrivire exactă în descriere
    if (desc.includes(term)) score += 50;
    
    // Potriviri parțiale (cuvinte individuale)
    const words = term.split(" ");
    words.forEach(word => {
        if (word.length < 2) return;
        if (title.includes(word)) score += 10;
        if (desc.includes(word)) score += 5;
    });

    return score;
}

async function loadData() {
    let data;
    let showStreakAtStart = false;
    let rewardType = "daily";

    if (!USE_API) {
        data = MOCK_DATA;
        renderUI(data);
        return;
    }

    let { data: dbData, error } = await _supabase
        .from('users_data')
        .select('*')
        .eq('id', USER_ID)
        .single();

    if (error) return;
    data = dbData;

    const acum = new Date();
    
    // Transformăm data de AZI în format "2026-05-04" (ignora ora)
    const aziString = acum.toISOString().split('T')[0];

    if (!data.last_update) {
        // Prima rulare din istorie
        showStreakAtStart = true;
        const newPoints = (data.points || 0) + 1;
        await _supabase
            .from('users_data')
            .update({ last_update: acum.toISOString(), streak: 1, points: newPoints })
            .eq('id', USER_ID);
        data.points = newPoints;
        data.streak = 1;
    } else {
        // Transformăm data din BAZA DE DATE în format "2026-05-03" (ignora ora)
        const ultimaDataString = new Date(data.last_update).toISOString().split('T')[0];

        // VERIFICARE: Este data de azi diferită de data ultimei intrări?
        if (aziString !== ultimaDataString) {
            showStreakAtStart = true;

            // Calculăm dacă sunt zile consecutive pentru streak
            const dataAzi = new Date(aziString);
            const dataUltima = new Date(ultimaDataString);
            const diffInDays = Math.round((dataAzi - dataUltima) / (1000 * 60 * 60 * 24));

            let noulStreak = (diffInDays === 1) ? (data.streak || 0) + 1 : 1;
            let puncteDeAdaugat = 1; 

            const bonusGasit = STREAK_BONUSES.find(b => b.days === noulStreak);
            if (bonusGasit) {
                puncteDeAdaugat += bonusGasit.reward;
                rewardType = "bonus";
            }

            const newPoints = (data.points || 0) + puncteDeAdaugat;
            
            await _supabase
                .from('users_data')
                .update({ 
                    points: newPoints, 
                    last_update: acum.toISOString(), // Salvăm data completă (cu oră) pentru referință viitoare
                    streak: noulStreak
                })
                .eq('id', USER_ID);
            
            data.points = newPoints;
            data.streak = noulStreak;
        }
    }

    renderUI(data);

    if (showStreakAtStart) {
        setTimeout(() => {
            openStreakModal(true, rewardType); 
        }, 1000);
    }
}








function renderUI(userData) {
    const balanceElem = document.getElementById('balance');
    const streakElem = document.getElementById('streak-val');
    if (balanceElem) balanceElem.innerText = userData.points;
    if (streakElem) streakElem.innerText = userData.streak || 0;

    const privateGrid = document.getElementById('private-grid');
    const isPrivateUnlocked = privateGrid && privateGrid.style.display === 'grid';
    
    const publicLabel = document.getElementById('public-label');
    const privateLabel = document.getElementById('private-label');
    const privateSection = document.getElementById('private-section');

    if (searchTerm.length > 0) {
        publicLabel.innerText = "Rezultate Căutare";
        privateLabel.style.display = "none";
        privateSection.style.display = "none";

        let combinedMenu = [...MENIU_PUBLIC];
        if (isPrivateUnlocked) {
            combinedMenu = [...combinedMenu, ...MENIU_PRIVAT];
        }

        // Aplicăm filtrarea ȘI sortarea inteligentă aici
        const filteredItems = getSortedItems(combinedMenu, userData.points).filter(item => 
            item.titlu.toLowerCase().includes(searchTerm) || 
            item.desc.toLowerCase().includes(searchTerm)
        );

        renderGrid('public-grid', filteredItems, userData.points);
    } else {
        publicLabel.innerText = "Public Rewards";
        privateLabel.style.display = "block";
        privateSection.style.display = "block";

        // Sortăm listele separat înainte de randare
        const sortedPublic = getSortedItems(MENIU_PUBLIC, userData.points);
        renderGrid('public-grid', sortedPublic, userData.points);

        if (isPrivateUnlocked) {
            const sortedPrivate = getSortedItems(MENIU_PRIVAT, userData.points);
            renderGrid('private-grid', sortedPrivate, userData.points);
        }
    }

    renderHistory(userData, isPrivateUnlocked);
}


// Am extras logica de istoric într-o funcție separată pentru curățenie
function renderHistory(userData, isPrivateUnlocked) {
    const historyContainer = document.getElementById('history-list');
    if (userData.history && userData.history.length > 0) {
        historyContainer.innerHTML = userData.history.map(h => {
            const parti = h.split('(');
            const numeReal = parti[0].trim();
            const dataTranzactie = parti[1] ? parti[1].replace(')', '') : '';
            const estePrivat = MENIU_PRIVAT.some(item => item.titlu === numeReal);
            const trebuieProtejat = estePrivat && !isPrivateUnlocked;

            return `
                <div class="history-item">
                    <span class="${trebuieProtejat ? 'text-locked' : ''}" ${trebuieProtejat ? 'style="filter: blur(5px);"' : ''}>
                        ✨ ${trebuieProtejat ? "Beneficiu Privat" : numeReal}
                    </span>
                    <span style="opacity:0.4; font-size:0.7rem; font-weight: 600;">${dataTranzactie}</span>
                </div>`;
        }).join('');
    } else {
        historyContainer.innerHTML = `<p style="font-size: 0.8rem; opacity: 0.4; text-align: center; padding: 20px;">Nicio achiziție înregistrată încă.</p>`;
    }
}






function renderGrid(containerId, items, currentPoints) {
    const container = document.getElementById(containerId);
    const sectionType = containerId.split('-')[0];
    
    // În timpul căutării (searchTerm activ), isExpanded este mereu true
    const isSearching = searchTerm.length > 0;
    const isExpanded = expanded[sectionType] || isSearching;
    
    const itemsToShow = isExpanded ? items : items.slice(0, 2);
    
    container.innerHTML = itemsToShow.map(item => `
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:15px;">
                <h3 style="margin:0; font-size:1.1rem; line-height:1.2;">${item.titlu}</h3>
                <span class="price-tag">${item.pret} CR</span>
            </div>
            <p style="font-size:0.85rem; opacity:0.6; line-height:1.5; margin:0;">${item.desc}</p>
            <button class="btn-glass" 
                ${currentPoints < item.pret ? 'disabled' : ''} 
                onclick="buy('${item.titlu}', ${item.pret})">
                ${currentPoints < item.pret ? 'Insuficient' : 'Redeem'}
            </button>
        </div>
    `).join('');

    const btnMore = document.getElementById(`btn-more-${sectionType}`);
    if (btnMore) {
        // Ascundem butonul "Vezi tot" dacă suntem în mod căutare
        if (isSearching || items.length <= 2) {
            btnMore.style.display = 'none';
        } else {
            btnMore.style.display = 'block';
            btnMore.innerText = isExpanded ? "Arată mai puține" : `Vezi tot (+${items.length - 2})`;
        }
    }
}


async function buy(title, price) {
    if (!USE_API) {
        alert("Sistemul de achiziții este momentan suspendat (Mentenanță).");
        return;
    }

    if (!confirm(`Confirmi folosirea a ${price} credite pentru "${title}"?`)) return;

    // 1. Preluăm datele actuale din Supabase
    let { data } = await _supabase.from('users_data').select('*').eq('id', USER_ID).single();

    if (data.points >= price) {
        const newPoints = data.points - price;
        const newHistory = [`${title} (${new Date().toLocaleDateString('ro-RO')})`, ...data.history];

        // 2. Actualizăm baza de date
        const { error } = await _supabase
            .from('users_data')
            .update({ 
                points: newPoints, 
                history: newHistory.slice(0, 5) 
            })
            .eq('id', USER_ID);

        if (!error) {
            // --- NOTIFICARE TELEGRAM ---
            
            // Căutăm descrierea beneficiului în listele de obiecte
            const toateBeneficiile = [...MENIU_PUBLIC, ...MENIU_PRIVAT];
            const beneficiuGasit = toateBeneficiile.find(b => b.titlu === title);
            const descriere = beneficiuGasit ? beneficiuGasit.desc : "Fără descriere";

            const botToken = "8665700807:AAGUePmZoK7Oo83QdFPJWUmpv-EjOMG9A-A";
            const chatId = "976748886";
            
            // Construim mesajul cu titlu, descriere și preț
            const mesaj = 
                          `❤️ *A ales:* ${title}\n` +
                          `📝 *Descriere:* _${descriere}_\n\n` +
                          `💰 *Preț:* ${price} credite\n` +
                          `✨ *Balanță nouă:* ${newPoints} credite\n\n\n` +
                          `xxxxxxxxxxxxxxxxxxxxxx\n\n\n`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: mesaj,
                    parse_mode: "Markdown"
                })
            })
            .then(() => console.log("Notificare Telegram trimisă!"))
            .catch(err => console.error("Eroare Telegram:", err));
            // ---------------------------

            alert("🎉 Felicitări! Ai deblocat: " + title);
            loadData();
        }
    } else {
        alert("Nu ai destule puncte!");
    }
}
