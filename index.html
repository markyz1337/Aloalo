<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA într-un singur fișier</title>

    <link rel="manifest" href='data:application/manifest+json,{"name":"AppCompacta","short_name":"App","start_url":"index.html","display":"standalone","background_color":"#ffffff","theme_color":"#007bff","icons":[{"src":"https://via.placeholder.com/192","sizes":"192x192","type":"image/png"}]}'>

    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        /* Stilul bannerului de hint */
        #pwa-hint {
            display: none; position: fixed; bottom: 20px; left: 50%; 
            transform: translateX(-50%); background: #333; color: #fff;
            padding: 15px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 100; width: 80%; max-width: 400px;
        }
        #btn-install { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Pagina mea PWA</h1>
    <p>Dacă ești pe mobil sau Chrome desktop, ar trebui să vezi invitația jos.</p>

    <div id="pwa-hint">
        <div>Vrei să instalezi aplicația pe ecranul principal?</div>
        <button id="btn-install">Instalează Acum</button>
    </div>

    <script>
        let deferredPrompt;

        // 1. Înregistrare Service Worker (Fișierul sw.js e obligatoriu extern)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        // 2. Logică detectare și afișare hint
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            // Arătăm bannerul doar dacă NU este deja instalat
            if (!window.matchMedia('(display-mode: standalone)').matches) {
                document.getElementById('pwa-hint').style.display = 'block';
            }
        });

        document.getElementById('btn-install').addEventListener('click', async () => {
            if (deferredPrompt) {
                deferredPrompt.prompt();
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    document.getElementById('pwa-hint').style.display = 'none';
                }
                deferredPrompt = null;
            }
        });

        // Ascundem dacă s-a instalat cu succes
        window.addEventListener('appinstalled', () => {
            document.getElementById('pwa-hint').style.display = 'none';
        });
    </script>
</body>
</html>
