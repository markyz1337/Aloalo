<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Walkthrough Apartament Mobil</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  </head>
  
  <body style="margin: 0; overflow: hidden; background-color: #000;">

    <a-scene 
      renderer="antialias: true; colorManagement: true;"
      xr-mode-ui="enabled: false"> <a-assets>
        <a-asset-item id="model-demo" src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Sponza/glTF-Binary/Sponza.glb"></a-asset-item>
      </a-assets>

      <a-entity light="type: ambient; intensity: 1;"></a-entity>
      <a-entity light="type: directional; intensity: 0.8;" position="1 4 3"></a-entity>

      <a-entity 
        gltf-model="#model-demo" 
        position="0 0 0" 
        scale="1 1 1">
      </a-entity>

      <a-entity id="rig" movement-controls="controls: nipple; speed: 0.2;" position="0 0 5">
        <a-entity camera 
                  look-controls="pointerLockEnabled: true" 
                  position="0 1.6 0">
        </a-entity>
      </a-entity>

      <a-sky color="#87CEEB"></a-sky>

    </a-scene>

    <div style="position: fixed; bottom: 30px; width: 100%; text-align: center; color: white; font-family: sans-serif; pointer-events: none; text-shadow: 1px 1px 2px black;">
      <b>CONTROL MOBIL:</b><br>
      Atinge stânga ecranului pentru JOYSTICK (mișcare)<br>
      Glisează în dreapta pentru a PRIVI
    </div>

  </body>
</html>
