<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glow | Glassmorphic Suite</title>
    <!-- Script Supabase adăugat -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #ff4d6d;
            --accent-glow: rgba(255, 77, 109, 0.4);
            --bg-dark: #0a0a0c;
            --locked: #7400b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 77, 109, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(116, 0, 184, 0.05) 0%, transparent 40%);
            color: #ffffff;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        /* HUD RADIO */
        #radio-popup {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 1000;
            background: rgba(20, 20, 22, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 10px 18px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .radio-title {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
            white-space: nowrap;
        }

        /* HUD PUNCTE */
        #points-hud {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: rgba(20, 20, 22, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        #points-hud .val {
            font-size: 1.4rem;
            font-weight: 700;
            background: linear-gradient(to right, #fff, #ffb3c1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* GRID & CARDS */
        .app-container { width: 100%; max-width: 900px; margin-top: 60px; }
        .section-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin: 40px 0 15px 10px; font-weight: 700; opacity: 0.8; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; align-items: start; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.3s ease;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent-glow); background: rgba(255, 255, 255, 0.06); }
        
        .price-tag { font-size: 0.8rem; font-weight: 700; color: var(--accent); background: rgba(255, 77, 109, 0.1); padding: 4px 10px; border-radius: 10px; }
        
        .btn-glass {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; padding: 12px; border-radius: 18px; width: 100%; cursor: pointer;
            font-weight: 600; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; transition: 0.3s;
        }
        .btn-glass:hover:not(:disabled) { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }

        /* LOCKED STATE */
        .locked-overlay {
            text-align: center; padding: 40px 20px;
            background: rgba(116, 0, 184, 0.03);
            border: 1px dashed var(--locked);
            border-radius: 28px;
            cursor: pointer;
            transition: 0.3s;
        }
        .locked-overlay:hover { background: rgba(116, 0, 184, 0.08); border-style: solid; }

        /* VISUALIZER */
        .viz { display: flex; gap: 3px; align-items: flex-end; height: 12px; }
        .bar { width: 3px; height: 4px; background: var(--accent); border-radius: 1px; transition: 0.3s; }
        .playing .bar { animation: bounce 0.8s infinite alternate; }
        .bar:nth-child(2) { animation-delay: 0.2s; }
        .bar:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce { from { height: 4px; } to { height: 12px; } }

        @media (max-width: 600px) {
            #radio-popup { top: auto; bottom: 20px; left: 20px; }
            #points-hud { top: auto; bottom: 20px; right: 20px; }
        }
    </style>
</head>
<body>

    <div id="radio-popup">
        <button id="play-btn" style="background:var(--accent); border:none; width:32px; height:32px; border-radius:50%; cursor:pointer; display:flex; align-items:center; justify-content:center;" onclick="toggleRadio()">
            <svg id="p-play" viewBox="0 0 24 24" width="14"><path fill="white" d="M8 5v14l11-7z"/></svg>
            <svg id="p-pause" viewBox="0 0 24 24" style="display:none;" width="14"><path fill="white" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <div class="radio-info" style="display: flex; flex-direction: column; gap: 2px;">
            <span class="radio-title">HOPE FM</span>
            <div class="viz" id="viz"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
        </div>
        <audio id="audio" src="https://sergiumusic.duckdns.org/hope"></audio>
    </div>

    <div id="points-hud">
        <span style="filter: drop-shadow(0 0 5px var(--accent)); font-size: 1.2rem;">✨</span>
        <div style="display: flex; flex-direction: column;">
            <span class="val" id="balance">--</span>
            <span style="font-size: 0.5rem; opacity: 0.5; text-transform: uppercase; letter-spacing: 1px;">Credits</span>
        </div>
    </div>

    <div class="app-container">
        <header>
            <h1 style="margin:0; font-weight:700; font-size: 2.2rem; letter-spacing: -1px;">Privilege Suite</h1>
            <p style="opacity: 0.4; font-size: 0.9rem; margin-top: 5px;">Răsfață-te cu recompensele meritate.</p>
        </header>

        <div class="section-label">Public Rewards</div>
        <div class="grid" id="public-grid"></div>

        <div class="section-label">Private Vault</div>
        <div id="private-section">
            <div class="locked-overlay" onclick="unlockPrivate()">
                <span style="font-size: 1.5rem;">🔒</span>
                <p style="margin: 10px 0 0 0; font-size: 0.75rem; font-weight: 700; color: var(--locked); text-transform: uppercase; letter-spacing: 1px;">Acces Restricționat</p>
            </div>
            <div class="grid" id="private-grid" style="display: none;"></div>
        </div>
    </div>

    <script>
        const PAROLA_SECRETA = "1234";
        const SUPABASE_URL = 'https://fndjrfieitieqzafhyzz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_bHDKjiKAVHqW199ICw7i2g_O3olYMAr';
        
        let globalPoints = 0; // Se va actualiza din Supabase

        const MENIU_PUBLIC = [
            { titlu: "Masaj", desc: "O sesiune rapidă de relaxare.", pret: 15 },
            { titlu: "Mic Dejun", desc: "Servit la pat, cu tot ce poftești.", pret: 10 },
            { titlu: "Movie Night", desc: "Tu alegi filmul, eu aduc floricelele.", pret: 5 }
        ];

        const MENIU_PRIVAT = [
            { titlu: "Cina Romantică", desc: "Meniu complet, vin și atmosferă de vis.", pret: 50 },
            { titlu: "Escapadă de Weekend", desc: "Plecăm unde vrei tu, fără nicio grijă.", pret: 150 }
        ];

        // --- FUNCȚIA SUPABASE ---
        async function loadData() {
            try {
                const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                let { data, error } = await _supabase.from('users_data').select('*').eq('id', 'iubita-mea').single();
                
                if (error || !data) throw new Error("Eroare Supabase");
                
                globalPoints = data.points;
                updateUI(globalPoints);
            } catch (e) {
                console.warn("Folosim date simulate (eroare conexiune)");
                globalPoints = 25; // Valoare fallback
                updateUI(globalPoints);
            }
        }

        function updateUI(points) {
            document.getElementById('balance').innerText = points;
            renderGrid('public-grid', MENIU_PUBLIC, points);
            // Dacă secțiunea privată e deja vizibilă, o re-randăm să updateze butoanele
            if(document.getElementById('private-grid').style.display === 'grid') {
                renderGrid('private-grid', MENIU_PRIVAT, points);
            }
        }

        function renderGrid(containerId, items, points) {
            const container = document.getElementById(containerId);
            container.innerHTML = items.map(item => `
                <div class="glass-card">
                    <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:15px;">
                        <h3 style="margin:0; font-size:1.1rem; line-height:1.2;">${item.titlu}</h3>
                        <span class="price-tag">${item.pret} CR</span>
                    </div>
                    <p style="font-size:0.85rem; opacity:0.6; line-height:1.5; margin:0;">${item.desc}</p>
                    <button class="btn-glass" ${points < item.pret ? 'disabled' : ''} onclick="alert('Redeemed: ${item.titlu}')">
                        ${points < item.pret ? 'Insuficient' : 'Redeem'}
                    </button>
                </div>
            `).join('');
        }

        function unlockPrivate() {
            const input = prompt("Introdu parola:");
            if (input === PAROLA_SECRETA) {
                document.querySelector('.locked-overlay').style.display = 'none';
                document.getElementById('private-grid').style.display = 'grid';
                renderGrid('private-grid', MENIU_PRIVAT, globalPoints);
            } else if (input !== null) {
                alert("Parolă incorectă!");
            }
        }

        function toggleRadio() {
            const audio = document.getElementById('audio');
            const viz = document.getElementById('viz');
            if (audio.paused) {
                audio.play(); viz.classList.add('playing');
                document.getElementById('p-play').style.display = 'none';
                document.getElementById('p-pause').style.display = 'block';
            } else {
                audio.pause(); viz.classList.remove('playing');
                document.getElementById('p-play').style.display = 'block';
                document.getElementById('p-pause').style.display = 'none';
            }
        }

        // Inițializare
        loadData();
    </script>
</body>
</html>
