<!DOCTYPE html>

<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SergiuTok</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

:root {
–pink: #FE2C55;
–cyan: #25F4EE;
–dark: #000;
–mid: #161823;
–text: #fff;
–sub: rgba(255,255,255,0.6);
}

body {
background: var(–dark);
color: var(–text);
font-family: -apple-system, BlinkMacSystemFont, ‘Segoe UI’, sans-serif;
height: 100dvh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* ─── TOP NAV ─── */
.top-nav {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 100;
display: flex;
align-items: center;
justify-content: center;
padding: 12px 16px 8px;
background: linear-gradient(to bottom, rgba(0,0,0,0.7) 0%, transparent 100%);
pointer-events: none;
}
.nav-tabs {
display: flex;
gap: 24px;
pointer-events: all;
}
.nav-tab {
font-size: 16px;
font-weight: 600;
color: rgba(255,255,255,0.55);
cursor: pointer;
padding-bottom: 4px;
border-bottom: 2px solid transparent;
transition: all .2s;
letter-spacing: -0.2px;
}
.nav-tab.active {
color: #fff;
border-bottom: 2px solid #fff;
}
.nav-search {
position: absolute;
right: 16px;
top: 50%;
transform: translateY(-50%);
pointer-events: all;
cursor: pointer;
}
.nav-search svg { width: 22px; height: 22px; fill: #fff; }

/* ─── FEED ─── */
#feed {
height: 100dvh;
overflow-y: scroll;
scroll-snap-type: y mandatory;
-webkit-overflow-scrolling: touch;
scrollbar-width: none;
}
#feed::-webkit-scrollbar { display: none; }

/* ─── VIDEO ITEM ─── */
.video-item {
position: relative;
width: 100%;
height: 100dvh;
scroll-snap-align: start;
scroll-snap-stop: always;
background: #000;
overflow: hidden;
}

video {
position: absolute;
inset: 0;
width: 100%;
height: 100%;
object-fit: cover;
cursor: pointer;
}

/* Gradient overlays */
.overlay-top {
position: absolute;
top: 0; left: 0; right: 0;
height: 180px;
background: linear-gradient(to bottom, rgba(0,0,0,0.4), transparent);
pointer-events: none;
z-index: 2;
}
.overlay-bottom {
position: absolute;
bottom: 0; left: 0; right: 0;
height: 280px;
background: linear-gradient(to top, rgba(0,0,0,0.7) 0%, transparent 100%);
pointer-events: none;
z-index: 2;
}

/* ─── PAUSE ICON ─── */
.pause-icon {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
z-index: 5;
opacity: 0;
pointer-events: none;
transition: opacity .15s;
}
.pause-icon.show { opacity: 1; }
.pause-icon svg { width: 80px; height: 80px; fill: rgba(255,255,255,0.8); filter: drop-shadow(0 2px 12px rgba(0,0,0,0.5)); }

/* ─── RIGHT SIDEBAR ─── */
.sidebar {
position: absolute;
right: 12px;
bottom: 90px;
z-index: 10;
display: flex;
flex-direction: column;
align-items: center;
gap: 20px;
}

.avatar-wrap {
position: relative;
margin-bottom: 4px;
}
.avatar {
width: 48px;
height: 48px;
border-radius: 50%;
border: 2px solid #fff;
object-fit: cover;
display: block;
}
.avatar-placeholder {
width: 48px;
height: 48px;
border-radius: 50%;
border: 2px solid #fff;
background: linear-gradient(135deg, #FE2C55, #25F4EE);
display: flex;
align-items: center;
justify-content: center;
font-size: 20px;
font-weight: 700;
color: #fff;
}
.follow-btn {
position: absolute;
bottom: -8px;
left: 50%;
transform: translateX(-50%);
width: 20px;
height: 20px;
border-radius: 50%;
background: var(–pink);
color: #fff;
font-size: 16px;
font-weight: 700;
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
border: none;
line-height: 1;
}

.action-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
cursor: pointer;
background: none;
border: none;
color: #fff;
user-select: none;
-webkit-tap-highlight-color: transparent;
}
.action-btn .icon-wrap {
width: 44px;
height: 44px;
display: flex;
align-items: center;
justify-content: center;
}
.action-btn svg { width: 32px; height: 32px; }
.action-btn span {
font-size: 12px;
font-weight: 600;
color: #fff;
letter-spacing: -0.2px;
}
.action-btn.liked svg { fill: var(–pink); }
.action-btn.liked span { color: var(–pink); }

/* heart animation */
@keyframes heartPop {
0% { transform: scale(1); }
30% { transform: scale(1.4); }
60% { transform: scale(0.9); }
100% { transform: scale(1); }
}
.action-btn.pop .icon-wrap { animation: heartPop .35s ease; }

/* Vinyl disc */
.vinyl-wrap {
width: 48px;
height: 48px;
border-radius: 50%;
background: #161823;
border: 3px solid #333;
display: flex;
align-items: center;
justify-content: center;
overflow: hidden;
animation: spin 4s linear infinite;
animation-play-state: paused;
}
.vinyl-wrap.playing { animation-play-state: running; }
.vinyl-inner {
width: 18px;
height: 18px;
border-radius: 50%;
background: #000;
border: 2px solid #444;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ─── BOTTOM INFO ─── */
.info {
position: absolute;
bottom: 80px;
left: 14px;
right: 80px;
z-index: 10;
}
.info .username {
font-size: 16px;
font-weight: 700;
margin-bottom: 6px;
letter-spacing: -0.3px;
}
.info .caption {
font-size: 14px;
font-weight: 400;
line-height: 1.4;
color: rgba(255,255,255,0.95);
margin-bottom: 8px;
display: -webkit-box;
-webkit-line-clamp: 2;
-webkit-box-orient: vertical;
overflow: hidden;
}
.info .song {
display: flex;
align-items: center;
gap: 6px;
font-size: 13px;
font-weight: 600;
}
.info .song svg { width: 14px; height: 14px; fill: #fff; flex-shrink: 0; }
.marquee-wrap {
overflow: hidden;
width: 180px;
}
.marquee-text {
white-space: nowrap;
animation: marquee 8s linear infinite;
display: inline-block;
}
@keyframes marquee {
0% { transform: translateX(0); }
100% { transform: translateX(-50%); }
}

/* ─── PROGRESS BAR ─── */
.progress-bar {
position: absolute;
bottom: 0;
left: 0; right: 0;
height: 2px;
background: rgba(255,255,255,0.2);
z-index: 20;
}
.progress-fill {
height: 100%;
background: var(–pink);
width: 0%;
transition: width 0.2s linear;
}

/* ─── BOTTOM NAV ─── */
.bottom-nav {
position: fixed;
bottom: 0; left: 0; right: 0;
height: 58px;
background: rgba(0,0,0,0.92);
backdrop-filter: blur(20px);
border-top: 1px solid rgba(255,255,255,0.08);
display: flex;
align-items: center;
justify-content: space-around;
z-index: 100;
padding-bottom: env(safe-area-inset-bottom);
}
.bottom-btn {
display: flex;
flex-direction: column;
align-items: center;
gap: 2px;
cursor: pointer;
padding: 4px 12px;
-webkit-tap-highlight-color: transparent;
}
.bottom-btn svg { width: 24px; height: 24px; fill: rgba(255,255,255,0.5); }
.bottom-btn.active svg { fill: #fff; }
.bottom-btn span { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 600; }
.bottom-btn.active span { color: #fff; }

/* Plus button */
.plus-btn {
display: flex;
align-items: center;
justify-content: center;
cursor: pointer;
}
.plus-inner {
background: linear-gradient(to right, var(–cyan), var(–pink));
border-radius: 8px;
padding: 2px;
}
.plus-center {
background: #fff;
color: #000;
font-size: 20px;
font-weight: 700;
border-radius: 6px;
width: 38px;
height: 28px;
display: flex;
align-items: center;
justify-content: center;
line-height: 1;
}

/* ─── DOUBLE TAP HEART ─── */
.floating-heart {
position: absolute;
z-index: 30;
pointer-events: none;
font-size: 80px;
animation: floatHeart .8s ease forwards;
}
@keyframes floatHeart {
0%   { opacity: 1; transform: scale(0.5) translateY(0); }
50%  { opacity: 1; transform: scale(1.3) translateY(-30px); }
100% { opacity: 0; transform: scale(1) translateY(-80px); }
}

/* ─── LOADING ─── */
.loader {
position: absolute;
inset: 0;
display: flex;
align-items: center;
justify-content: center;
z-index: 15;
background: #111;
}
.spinner {
width: 36px; height: 36px;
border: 3px solid rgba(255,255,255,0.15);
border-top-color: var(–pink);
border-radius: 50%;
animation: spin .8s linear infinite;
}
</style>

</head>
<body>

<!-- TOP NAV -->

<nav class="top-nav">
  <div class="nav-tabs">
    <div class="nav-tab">Following</div>
    <div class="nav-tab active">For You</div>
    <div class="nav-tab">Explore</div>
  </div>
  <div class="nav-search">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
  </div>
</nav>

<!-- FEED -->

<div id="feed"></div>

<!-- BOTTOM NAV -->

<nav class="bottom-nav">
  <div class="bottom-btn active" onclick="">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </div>
  <div class="bottom-btn" onclick="">
    <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    <span>Discover</span>
  </div>
  <div class="plus-btn" onclick="">
    <div class="plus-inner"><div class="plus-center">+</div></div>
  </div>
  <div class="bottom-btn" onclick="">
    <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
    <span>Inbox</span>
  </div>
  <div class="bottom-btn" onclick="">
    <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    <span>Profile</span>
  </div>
</nav>

<script>
// ─── VIDEO DATA ───
// Videoclipuri publice de la Pexels / sample-videos
const videos = [
  {
    src: 'https://github.com/markyz1337/m2/raw/refs/heads/main/v14044g50000d78dmqfog65jruu30ts0.MP4',
    user: '@nature_vibes',
    caption: 'Dimineața în pădure 🌿✨ Natură pură și liniște',
    song: '🎵 Ambient Forest - Relaxing Sounds',
    likes: '124.5K',
    comments: '3.2K',
    shares: '8.1K',
    color: '#2d5a27'
  },
  {
    src: 'https://github.com/markyz1337/m2/raw/refs/heads/main/v1c044g50000d77oc67og65j82uipkc0.MP4',
    user: '@ocean_dreams',
    caption: 'Valurile mării noaptea 🌊🌙 Cel mai relaxant sunet',
    song: '🎵 Ocean Waves - Lofi Chill',
    likes: '89.3K',
    comments: '1.8K',
    shares: '5.4K',
    color: '#1a3a5c'
  },
  {
    src: 'https://github.com/markyz1337/m2/raw/refs/heads/main/v26044gc0000d780kovog65m9qgfd580.MP4',
    user: '@city_pulse',
    caption: 'Orașul nu doarme niciodată 🌆🔥 Energie pură',
    song: '🎵 Urban Beat - Hip Hop Mix',
    likes: '312K',
    comments: '7.6K',
    shares: '22K',
    color: '#2a1a3a'
  },
  {
    src: 'https://videos.pexels.com/video-files/3195394/3195394-hd_1920_1080_30fps.mp4',
    user: '@food_lover_ro',
    caption: 'Rețetă rapidă în 60 secunde 🍝😍 Gata în 10 minute!',
    song: '🎵 Cooking Vibes - Energetic Pop',
    likes: '456K',
    comments: '12.1K',
    shares: '34K',
    color: '#3a2a1a'
  },
  {
    src: 'https://videos.pexels.com/video-files/4629877/4629877-hd_1920_1080_30fps.mp4',
    user: '@travel_with_me',
    caption: 'Apusul în munți ⛰️🌅 Niciodată nu mă satur',
    song: '🎵 Mountain High - Indie Folk',
    likes: '201K',
    comments: '4.9K',
    shares: '15K',
    color: '#3a1a1a'
  },
  {
    src: 'https://videos.pexels.com/video-files/2098827/2098827-hd_1920_1080_24fps.mp4',
    user: '@dance_ro',
    caption: 'Cine mai știe să danseze clasic? 💃🎶 Tag un prieten!',
    song: '🎵 Classic Groove - Retro Mix',
    likes: '678K',
    comments: '18.3K',
    shares: '51K',
    color: '#1a1a3a'
  }
];

// Shuffle videos
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

const shuffled = shuffle(videos);

// ─── BUILD FEED ───
const feed = document.getElementById('feed');
const initials = (name) => name.replace('@','').charAt(0).toUpperCase();
const gradients = [
  'linear-gradient(135deg,#FE2C55,#25F4EE)',
  'linear-gradient(135deg,#FF6B35,#F7C59F)',
  'linear-gradient(135deg,#8B5CF6,#EC4899)',
  'linear-gradient(135deg,#10B981,#3B82F6)',
  'linear-gradient(135deg,#F59E0B,#EF4444)',
  'linear-gradient(135deg,#6366F1,#8B5CF6)',
];

shuffled.forEach((v, i) => {
  const item = document.createElement('div');
  item.className = 'video-item';
  item.dataset.index = i;

  const songText = v.song + '  •  ' + v.song + '  •  ';

  item.innerHTML = `
    <div class="loader"><div class="spinner"></div></div>

    <video
      src="${v.src}"
      loop
      muted
      playsinline
      preload="metadata"
    ></video>

    <div class="overlay-top"></div>
    <div class="overlay-bottom"></div>

    <div class="pause-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="avatar-wrap">
        <div class="avatar-placeholder" style="background:${gradients[i % gradients.length]}">
          ${initials(v.user)}
        </div>
        <button class="follow-btn" onclick="this.style.background='#555'; this.textContent='✓'">+</button>
      </div>

      <button class="action-btn like-btn" data-count="${v.likes}">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        </div>
        <span>${v.likes}</span>
      </button>

      <button class="action-btn comment-btn">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-2 12H6v-2h12v2zm0-3H6V9h12v2zm0-3H6V6h12v2z"/></svg>
        </div>
        <span>${v.comments}</span>
      </button>

      <button class="action-btn share-btn">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="white"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
        </div>
        <span>${v.shares}</span>
      </button>

      <div class="vinyl-wrap" data-vinyl>
        <div class="vinyl-inner"></div>
      </div>
    </div>

    <!-- BOTTOM INFO -->
    <div class="info">
      <div class="username">${v.user}</div>
      <div class="caption">${v.caption}</div>
      <div class="song">
        <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        <div class="marquee-wrap">
          <span class="marquee-text">${songText}</span>
        </div>
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div class="progress-bar"><div class="progress-fill"></div></div>
  `;

  feed.appendChild(item);

  // ─── VIDEO EVENTS ───
  const video = item.querySelector('video');
  const loader = item.querySelector('.loader');
  const pauseIcon = item.querySelector('.pause-icon');
  const progressFill = item.querySelector('.progress-fill');
  const vinyl = item.querySelector('[data-vinyl]');

  video.addEventListener('canplay', () => {
    loader.style.display = 'none';
  });

  video.addEventListener('timeupdate', () => {
    if (video.duration) {
      const pct = (video.currentTime / video.duration) * 100;
      progressFill.style.width = pct + '%';
    }
  });

  video.addEventListener('play', () => {
    vinyl.classList.add('playing');
  });
  video.addEventListener('pause', () => {
    vinyl.classList.remove('playing');
  });

  // Tap to pause/play
  let tapTimeout;
  let tapCount = 0;

  video.addEventListener('click', (e) => {
    tapCount++;
    if (tapCount === 1) {
      tapTimeout = setTimeout(() => {
        tapCount = 0;
        if (video.paused) {
          video.play();
          pauseIcon.classList.remove('show');
        } else {
          video.pause();
          pauseIcon.classList.add('show');
          // hide after 1.5s
          setTimeout(() => pauseIcon.classList.remove('show'), 1500);
        }
      }, 250);
    } else if (tapCount === 2) {
      clearTimeout(tapTimeout);
      tapCount = 0;
      // Double tap = like
      spawnHeart(item, e.clientX, e.clientY);
      triggerLike(item.querySelector('.like-btn'));
    }
  });

  // ─── LIKE BUTTON ───
  const likeBtn = item.querySelector('.like-btn');
  likeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    triggerLike(likeBtn);
  });

  // ─── COMMENT BTN ───
  item.querySelector('.comment-btn').addEventListener('click', (e) => {
    e.stopPropagation();
  });
  item.querySelector('.share-btn').addEventListener('click', (e) => {
    e.stopPropagation();
    if (navigator.share) {
      navigator.share({ title: v.user, text: v.caption });
    }
  });
});

// ─── LIKE ───
function triggerLike(btn) {
  btn.classList.toggle('liked');
  btn.classList.add('pop');
  btn.addEventListener('animationend', () => btn.classList.remove('pop'), { once: true });
}

// ─── FLOATING HEART ───
function spawnHeart(container, x, y) {
  const rect = container.getBoundingClientRect();
  const heart = document.createElement('div');
  heart.className = 'floating-heart';
  heart.textContent = '❤️';
  heart.style.left = (x - rect.left - 40) + 'px';
  heart.style.top = (y - rect.top - 40) + 'px';
  container.appendChild(heart);
  heart.addEventListener('animationend', () => heart.remove());
}

// ─── INTERSECTION OBSERVER (autoplay) ───
const allItems = document.querySelectorAll('.video-item');
let currentVideo = null;

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const video = entry.target.querySelector('video');
    if (entry.isIntersecting) {
      currentVideo = video;
      video.currentTime = 0;
      video.play().catch(() => {});
    } else {
      video.pause();
    }
  });
}, { threshold: 0.6 });

allItems.forEach(item => observer.observe(item));

// ─── NAV TABS ───
document.querySelectorAll('.nav-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
  });
});
</script>

</body>
</html>
