#custom-prompt {
    display: none; 
    position: fixed; 
    top: 0; 
    left: 0; 
    width: 100%; 
    height: 100%; 
    z-index: 9999;

.modal-content {

#pw-input {
    background: rgba(0, 0, 0, 0.2) !important;
    border: 1px solid rgba(116, 0, 184, 0.3) !important;
    color: #fff !important;
    box-shadow: inset 0 2px 10px rgba(0,0,0,0.3);
    transition: all 0.3s ease;
    margin-top: 20px !important;
}

#pw-input:focus {
    border-color: var(--locked) !important;
    box-shadow: 0 0 15px rgba(116, 0, 184, 0.4), inset 0 2px 10px rgba(0,0,0,0.3);
}

.pin-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 3px;
    color: var(--locked);

    margin-bottom: 5px;
    display: block;
}




.text-locked {
    filter: blur(6px);
    user-select: none;         /* Previne selectarea textului */
    pointer-events: none;      /* Previne click/dreapta pe el */
    -webkit-user-select: none; /* Safari */
}


.hope-title { 
    font-family: 'Dancing Script', cursive;
    font-size: 3.9rem; /* Ajustat pentru a se potrivi în layout */
    margin: 0; 
    background: linear-gradient(45deg, #c9184a, #ff4d6d);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.1);
    animation: floatTitle 3s ease-in-out infinite;
    display: inline-block;
}

@keyframes floatTitle {
    0%, 100% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-10px) rotate(1deg); }
}

/* Ajustare pentru ecrane mici */
@media (max-width: 480px) {
    .hope-title {
        font-size: 4.1rem;
    }
}


.search-container {
    margin-top: 20px; 
    padding: 0 25px !important; 
    height: 48px; 
    display: flex !important; /* Forțează layout de tip rând */
    flex-direction: row !important; /* Elementele stau unul lângă altul, nu sub altul */
    align-items: center !important; /* Aliniere verticală perfectă */
    gap: 12px;
    border-radius: 50px !important;
    min-height: unset !important;
}

/* Ne asigurăm că input-ul nu are margini care să îl împingă */
#search-input {
    margin: 0 !important;
    padding: 0 !important;
    line-height: normal !important;
}




/* MODIFICĂ ACEST BLOC ÎN CSS */
#radio-popup {
    position: fixed;
    top: 20px; /* Sau bottom: 20px conform media query-ului tău */
    left: 20px;
    z-index: 1000;
    background: transparent !important; /* FORȚEAZĂ TRANSPARENȚA */
    border: none !important;           /* SCOATE BORDURA */
    padding: 0;
    display: flex;
    align-items: center;
    cursor: pointer;
    box-shadow: none !important;      /* SCOATE UMBRA DREPTUNGHIULARĂ */
}


        .radio-title {
            font-size: 0.7rem;
            font-weight: 800;
            letter-spacing: 1.5px;
            color: var(--accent);
            text-transform: uppercase;
        }

        /* HUD PUNCTE */
        #points-hud {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;

        }

#points-hud .val {

    background: linear-gradient(to right, #fff, #ffb3c1);

    -webkit-text-fill-color: transparent;
}


        /* GRID & CARDS */
        .app-container { width: 100%; max-width: 900px; margin-top: 10px; }
        .section-label { font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--accent); margin: 40px 0 15px 10px; font-weight: 700; opacity: 0.8; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 24px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--accent-glow); background: rgba(255, 255, 255, 0.06); }
        
        .price-tag { font-size: 0.8rem; font-weight: 700; color: var(--accent); background: rgba(255, 77, 109, 0.1); padding: 4px 10px; border-radius: 10px; }
        
        .btn-glass {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: white; padding: 12px; border-radius: 18px; width: 100%; cursor: pointer;
            font-weight: 600; font-size: 0.75rem; text-transform: uppercase; margin-top: 15px; transition: 0.3s;
        }
        .btn-glass:hover:not(:disabled) { background: var(--accent); box-shadow: 0 0 15px var(--accent-glow); }
        .btn-glass:disabled { opacity: 0.3; cursor: not-allowed; }

        /* ISTORIC */
        .history-list { list-style: none; padding: 0; margin-top: 20px; }
        .history-item { 
            background: rgba(255,255,255,0.02);

            padding: 12px 20px; 
            border-radius: 15px; 
            font-size: 0.85rem; 
            display: flex; 
            justify-content: space-between;
            border: 1px solid var(--glass-border);
        }

        .locked-overlay {
            text-align: center; padding: 40px 20px;
            background: rgba(116, 0, 184, 0.03);
            border: 1px dashed var(--locked);
            border-radius: 28px;
            cursor: pointer;
            transition: 0.3s;

        .viz { display: flex; gap: 3px; align-items: flex-end; height: 12px; }

@media (max-width: 600px) {

/* Containerul butonului - acum vizibil când e oprit */
#play-indicator {
    width: 46px; /* Mărit cu 25% (de la 45px) */
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    z-index: 1;
}

/* Starea OPRIT: Efect de sticlă mată discretă */
.radio-off {
    background: rgba(255, 255, 255, 0.08) !important;
    border: 1px solid rgba(255, 255, 255, 0.15);
    color: rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
}

/* Starea PORNIT: Culoarea de accent și pregătirea stratului de sub */
.radio-on {
    background: var(--accent) !important;
    color: white;
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* Stratul de "respirație" care apare doar când e ON */
.radio-on::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: var(--accent);
    border-radius: 50%;
    z-index: -1;
    animation: breathing-layer 4s ease-in-out infinite;
}

/* Animația de respirație: doar fundalul se mișcă */
@keyframes breathing-layer {
    0%, 100% {
        transform: scale(1);
        box-shadow: 0 0 15px 2px rgba(255, 77, 109, 0.4);
        opacity: 0.8;
    }
    50% {
        transform: scale(1.15); /* Doar halo-ul se extinde */
        box-shadow: 0 0 25px 8px rgba(255, 77, 109, 0.5);
        opacity: 0.6;
    }
}

/* Fixăm iconițele să nu se mărească */
#play-indicator svg {
    position: relative;
    z-index: 3;
    width: 25px; /* Mărit cu 25% */
    height: 25px;
}







#radio-popup:active #play-indicator {
    transform: scale(0.9);
}

/* Stiluri Timeline */
.streak-timeline-side {

.timeline-v-track {

#timeline-fill-v {

function updateStreakVisuals(currentStreak) {
    document.getElementById('streak-title-display').innerText = `${currentStreak} Zile`;

    const milestones = [7, 30, 90, 180, 365];
    let totalPercent = 0;
    let nextGoal = 365;
    let foundNext = false;

    // Calculăm procentul barei raportat la segmente (0-100%)
    if (currentStreak <= 7) {
        totalPercent = 0;
    } else if (currentStreak <= 30) {
        totalPercent = ((currentStreak - 7) / (30 - 7)) * 25;
    } else if (currentStreak <= 90) {
        totalPercent = 25 + ((currentStreak - 30) / (90 - 30)) * 25;
    } else if (currentStreak <= 180) {
        totalPercent = 50 + ((currentStreak - 90) / (180 - 90)) * 25;
    } else if (currentStreak <= 365) {
        totalPercent = 75 + ((currentStreak - 180) / (365 - 180)) * 25;
    } else {
        totalPercent = 100;
    }

    // LIMITARE STRICTĂ: Bara nu poate trece de 100% (centrul ultimei buline)
    totalPercent = Math.min(Math.max(totalPercent, 0), 100);

    // Aplicăm animația
    setTimeout(() => {
        const fill = document.getElementById('timeline-fill-v');
        if (fill) fill.style.height = totalPercent + "%";
    }, 200);

    // Activăm vizual bulinele atinse
    milestones.forEach(m => {
        const dot = document.getElementById(`step-${m}`);
        if (dot) {
            if (currentStreak >= m) {
                dot.classList.add('reached');
            } else {
                dot.classList.remove('reached');
                if (!foundNext) { 
                    nextGoal = m; 
                    foundNext = true; 
                }
            }
        }
    });

    const hint = document.getElementById('next-goal-hint');
    
    // Configurare mesaje personalizate pentru fiecare prag
    const rewardsMessages = {
        7:   "Ești la începutul unei povești superbe! 🌸 <br><b>Bonus: +3 Credite</b> de bun venit.",
        30:  "O lună întreagă de strălucire! ✨ <br><b>Bonus: +10 Credite.</b><br> Te ador din ce în ce mai mult!",
        90:  "Trei luni de perfecțiune! 🏆 <br><b>Bonus: +15 Credite.</b> Ești oficial dependența mea preferată.",
        180: "Jumătate de an împreună aici! 👑 <br><b>Bonus: +25 Credite.</b> Meriți tot răsfățul din lume.",
        365: "Un an de magie pură! 💎 <br><b>Bonus: +50 Credite.</b> Ești regina regatului meu."
    };

    if (currentStreak >= 365) {
        hint.innerHTML = `<b>${rewardsMessages[365]}</b>`;
    } else {
        // Găsim ce mesaj să afișăm în funcție de următorul prag
        const message = rewardsMessages[nextGoal] || "Fiecare zi cu tine e un câștig! ✨";
        hint.innerHTML = `${message}<br><br><span style="font-size:0.75rem; opacity:0.8;">Mai ai <b>${nextGoal - currentStreak} zile</b> până la următorul prag.</span>`;
    }

}

function getSortedItems(items) {
    if (!searchTerm) return items;

    return [...items].sort((a, b) => {
        const scoreA = calculateScore(a, searchTerm);
        const scoreB = calculateScore(b, searchTerm);
        return scoreB - scoreA; // Cele cu scor mai mare primele
    });
}

function calculateScore(item, term) {
    let score = 0;
    const title = item.titlu.toLowerCase();
    const desc = item.desc.toLowerCase();

    // Potrivire exactă în titlu (Prioritate maximă)
    if (title.includes(term)) score += 100;
    // Potrivire exactă în descriere
    if (desc.includes(term)) score += 50;
    
    // Potriviri parțiale (cuvinte individuale)
    const words = term.split(" ");
    words.forEach(word => {
        if (word.length < 2) return;
        if (title.includes(word)) score += 10;
        if (desc.includes(word)) score += 5;
    });

    return score;
}


const STREAK_BONUSES = [
    { days: 7, reward: 3 },
    { days: 30, reward: 10 },
    { days: 90, reward: 15 },
    { days: 180, reward: 25 },
    { days: 365, reward: 50 }
];


async function loadData() {
    let data;
    let showStreakAtStart = false; // Variabilă pentru a știi dacă deschidem modalul

    // MOD SIMULARE (Offline)
    if (!USE_API) {
        data = MOCK_DATA;
        renderUI(data);
        // Opțional: scoate comentariul de mai jos dacă vrei să se deschidă și în modul test/offline
        // openStreakModal(true); 
        return;
    }

    // MOD REAL (Supabase)
    let { data: dbData, error } = await _supabase
        .from('users_data')
        .select('*')
        .eq('id', USER_ID)
        .single();

    if (error) return;
    data = dbData;

    const acum = new Date();
    const dataAzi = new Date(acum.getFullYear(), acum.getMonth(), acum.getDate());

    if (!data.last_update) {
        // Prima inițializare
        showStreakAtStart = true;
        await _supabase
            .from('users_data')
            .update({ last_update: acum.toISOString(), streak: 1, points: data.points + 1 })
            .eq('id', USER_ID);
        data.points += 1;
        data.streak = 1;
    } else {
        const ultimaActualizare = new Date(data.last_update);
        const dataUltima = new Date(ultimaActualizare.getFullYear(), ultimaActualizare.getMonth(), ultimaActualizare.getDate());
        
        const diferentaTimp = dataAzi.getTime() - dataUltima.getTime();
        const zileDiferenta = Math.round(diferentaTimp / (1000 * 3600 * 24));

        if (zileDiferenta >= 1) {
            showStreakAtStart = true; // S-a schimbat ziua, deci arătăm streak-ul
            let noulStreak = data.streak || 0;
            let puncteDeAdaugat = 1; 

            if (zileDiferenta === 1) {
                noulStreak += 1;
            } else {
                noulStreak = 1;
            }

            const bonusGasit = STREAK_BONUSES.find(b => b.days === noulStreak);
            if (bonusGasit) {
                puncteDeAdaugat += bonusGasit.reward;
            }

            const newPoints = (data.points || 0) + puncteDeAdaugat;
            
            await _supabase
                .from('users_data')
                .update({ 
                    points: newPoints, 
                    last_update: acum.toISOString(),
                    streak: noulStreak
                })
                .eq('id', USER_ID);
            
            data.points = newPoints;
            data.streak = noulStreak;
        }
    }

    renderUI(data);

    // Deschidem automat modalul dacă e prima intrare pe azi
    if (showStreakAtStart) {
        setTimeout(() => {
            openStreakModal(true); 
        }, 1000); // Mică întârziere pentru impact vizual
    }
}









function renderUI(userData) {
    // 1. Actualizăm HUD-ul (Valorile de sus)
    const balanceElem = document.getElementById('balance');
    const streakElem = document.getElementById('streak-val');

    if (balanceElem) balanceElem.innerText = userData.points;
    if (streakElem) streakElem.innerText = userData.streak || 0;

    // 2. Verificăm dacă Vault-ul privat este deblocat în acest moment
    const privateGrid = document.getElementById('private-grid');
    const isPrivateUnlocked = privateGrid && privateGrid.style.display === 'grid';

    // 3. Randăm Grila Publică
    const sortedPublic = getSortedItems(MENIU_PUBLIC);
    renderGrid('public-grid', sortedPublic, userData.points);

    // 4. Randăm Grila Privată (doar dacă e deblocată de codul secret)
    if (isPrivateUnlocked) {
        const sortedPrivate = getSortedItems(MENIU_PRIVAT);
        renderGrid('private-grid', sortedPrivate, userData.points);
    }

    // 5. Randăm Istoricul Tranzacțiilor
    const historyContainer = document.getElementById('history-list');
    
    if (userData.history && userData.history.length > 0) {
        historyContainer.innerHTML = userData.history.map(h => {
            // Extragem numele beneficiului (ex: din "Masaj (01.05.2026)")
            const parti = h.split('(');
            const numeReal = parti[0].trim();
            const dataTranzactie = parti[1] ? parti[1].replace(')', '') : '';
            
            // Identificăm dacă beneficiul este unul din categoria "Privat"
            const estePrivat = MENIU_PRIVAT.some(item => item.titlu === numeReal);
            
            // Dacă e privat și Vault-ul e blocat, aplicăm efectul de blur
            const trebuieProtejat = estePrivat && !isPrivateUnlocked;

            const textDeAfisat = trebuieProtejat ? "Beneficiu Privat" : numeReal;
            const extraStyle = trebuieProtejat ? 'style="filter: blur(5px); opacity: 0.7; user-select: none;"' : '';
            const clasaCenzura = trebuieProtejat ? "text-locked" : "";

            return `
                <div class="history-item" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; padding: 12px 15px; background: rgba(255,255,255,0.02); border-radius: 15px; border: 1px solid rgba(255,255,255,0.05);">
                    <span class="${clasaCenzura}" ${extraStyle}>
                        ✨ ${textDeAfisat}
                    </span>
                    <span style="opacity:0.4; font-size:0.7rem; font-weight: 600; white-space: nowrap; margin-left: 10px;">
                        ${dataTranzactie}
                    </span>
                </div>`;
        }).join('');
    } else {
        historyContainer.innerHTML = `
            <div style="padding: 20px; text-align: center;">
                <p style="font-size: 0.8rem; opacity: 0.4; margin: 0;">Nicio achiziție înregistrată încă.</p>
            </div>`;
    }

    // 6. Sincronizăm automat și popup-ul de streak dacă acesta este deja deschis
    const streakModal = document.getElementById('streak-modal');
    if (streakModal && streakModal.style.display === 'flex') {
        updateStreakVisuals(userData.streak || 0);
    }
}





function renderGrid(containerId, items, currentPoints) {
    const container = document.getElementById(containerId);
    const sectionType = containerId.split('-')[0];
    
    // Dacă se caută ceva, ignorăm limita de 3 și arătăm tot ce e relevant
    const isExpanded = expanded[sectionType] || searchTerm.length > 0;
    
    const itemsToShow = isExpanded ? items : items.slice(0, 2);
    
    // Randăm cardurile
    container.innerHTML = itemsToShow.map(item => `
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:15px;">
                <h3 style="margin:0; font-size:1.1rem; line-height:1.2;">${item.titlu}</h3>
                <span class="price-tag">${item.pret} CREDITS</span>
            </div>
            <p style="font-size:0.85rem; opacity:0.6; line-height:1.5; margin:0;">${item.desc}</p>
            <button class="btn-glass" 
                ${currentPoints < item.pret ? 'disabled' : ''} 
                onclick="buy('${item.titlu}', ${item.pret})">
                ${currentPoints < item.pret ? 'Insuficient' : 'Redeem'}
            </button>
        </div>
    `).join('');

    // Logică pentru butonul "Vezi tot / Vezi mai puțin"
    const btnMore = document.getElementById(`btn-more-${sectionType}`);
    if (items.length > 2) {
        btnMore.style.display = 'block';
        btnMore.innerText = isExpanded ? "Arată mai puține" : `Vezi tot (+${items.length - 2})`;
    } else {
        btnMore.style.display = 'none';
    }
}

async function buy(title, price) {
    if (!USE_API) {
        alert("Sistemul de achiziții este momentan suspendat (Mentenanță).");
        return;
    }

    if (!confirm(`Confirmi folosirea a ${price} credite pentru "${title}"?`)) return;

    // 1. Preluăm datele actuale din Supabase
    let { data } = await _supabase.from('users_data').select('*').eq('id', USER_ID).single();

    if (data.points >= price) {
        const newPoints = data.points - price;
        const newHistory = [`${title} (${new Date().toLocaleDateString('ro-RO')})`, ...data.history];

        // 2. Actualizăm baza de date
        const { error } = await _supabase
            .from('users_data')
            .update({ 
                points: newPoints, 
                history: newHistory.slice(0, 5) 
            })
            .eq('id', USER_ID);

        if (!error) {
            // --- NOTIFICARE TELEGRAM ---
            
            // Căutăm descrierea beneficiului în listele de obiecte
            const toateBeneficiile = [...MENIU_PUBLIC, ...MENIU_PRIVAT];
            const beneficiuGasit = toateBeneficiile.find(b => b.titlu === title);
            const descriere = beneficiuGasit ? beneficiuGasit.desc : "Fără descriere";

            const botToken = "8665700807:AAGUePmZoK7Oo83QdFPJWUmpv-EjOMG9A-A";
            const chatId = "976748886";
            
            // Construim mesajul cu titlu, descriere și preț
            const mesaj = 
                          `❤️ *A ales:* ${title}\n` +
                          `📝 *Descriere:* _${descriere}_\n\n` +
                          `💰 *Preț:* ${price} credite\n` +
                          `✨ *Balanță nouă:* ${newPoints} credite\n\n\n` +
                          `xxxxxxxxxxxxxxxxxxxxxx\n\n\n`;

            fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: chatId,
                    text: mesaj,
                    parse_mode: "Markdown"
                })
            })
            .then(() => console.log("Notificare Telegram trimisă!"))
            .catch(err => console.error("Eroare Telegram:", err));
            // ---------------------------

            alert("🎉 Felicitări! Ai deblocat: " + title);
            loadData();
        }
    } else {
        alert("Nu ai destule puncte!");
    }
}
